message = "Bienvenue sur <strong style=\"color:#0049a8\">Transat</strong>, <strong>l'appli ultime</strong> pour tout Atlante.\n\nTu veux savoir ce qui se passe sur le campus ? <strong>Les assos, le menu du RU, les machines à laver...</strong> <strong style=\"color:#0049a8\">tout est là</strong> (ou presque).\n\nBref, <strong>t'as fait le bon choix </strong>! Maintenant, explore et profite."
